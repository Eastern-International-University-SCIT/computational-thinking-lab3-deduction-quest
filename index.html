<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Interactive INFO201 computational-thinking lab with pathfinding, N-Queens, 0/1 Knapsack, and argument-validity games.">
  <title>Deduction Quest · INFO201</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><text y=%2252%22 font-size=%2252%22>♛</text></svg>">
  <link rel="stylesheet" href="css/combined.css">
</head>
<body>
  <header class="topbar">
    <button id="homeButton" class="brand" type="button" aria-label="Home">
      <span class="brand-mark">D</span>
      <span><strong>Deduction Quest</strong><small>INFO201 · Lab 3</small></span>
    </button>
    <div id="globalProgress" class="global-progress" aria-live="polite"></div>
    <div class="top-actions">
      <div id="langToggle" class="lang-toggle" aria-label="Language"></div>
      <button id="loadButton" class="button ghost" type="button" aria-label="Load progress"></button>
      <input id="loadInput" type="file" accept="application/json,.json" hidden>
      <button id="resetButton" class="button ghost" type="button"></button>
      <button id="saveButton" class="button primary" type="button"></button>
    </div>
  </header>

  <main id="app" class="app"></main>

  <div id="identityOverlay" class="overlay" hidden>
    <form id="identityForm" class="dialog" aria-labelledby="identityTitle">
      <button id="identityClose" class="dialog-close" type="button" aria-label="Close">×</button>
      <div class="dialog-icon">↓</div>
      <h2 id="identityTitle"></h2>
      <p id="identityText" class="muted"></p>
      <label><span id="studentIdLabel"></span><input id="studentId" autocomplete="off" required></label>
      <label><span id="studentNameLabel"></span><input id="studentName" autocomplete="name" required></label>
      <p id="identityError" class="error" hidden></p>
      <button id="downloadButton" class="button primary wide" type="submit"></button>
    </form>
  </div>

  <div id="tutorialOverlay" class="tutorial-overlay" hidden>
    <section class="tutorial-card" aria-live="polite">
      <span id="tutorialCount" class="eyebrow"></span>
      <h2 id="tutorialTitle"></h2>
      <p id="tutorialText"></p>
      <div class="tutorial-actions">
        <button id="tutorialSkip" class="button ghost" type="button"></button>
        <button id="tutorialNext" class="button primary" type="button"></button>
      </div>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="celebration" class="celebration" aria-hidden="true"></div>

  <!-- Data is JavaScript, rather than fetched JSON, so file:// works without a server. -->
  <script src="js/dijkstra-data.js"></script>
  <script src="js/deductive-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
